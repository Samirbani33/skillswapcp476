<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — SkillSwap</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<nav class="navbar">
  <a class="nav-logo" href="index.html">SkillSwap</a>
  <div class="nav-links" id="navLinks"></div>
</nav>
<div class="auth-wrap">
  <div class="auth-card">
    <h2>Welcome Back</h2>
    <p class="subtitle">Login to your SkillSwap account</p>
    <div class="alert" id="formAlert"></div>
    <form id="loginForm" novalidate>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@mylaurier.ca"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Your password"/>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Login</button>
    </form>
    <p class="auth-alt">Don't have an account? <a href="register.html">Register</a></p>
    <p class="auth-alt mt-1 text-muted" style="font-size:.8rem">
      Test accounts (password: <strong>password123</strong>)<br/>
      Buyer: bob@mylaurier.ca · Seller: alice@mylaurier.ca
    </p>
  </div>
</div>
<script src="js/api.js"></script>
<script src="js/validation.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
