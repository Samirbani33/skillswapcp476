<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — SkillSwap</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<nav class="navbar">
  <a class="nav-logo" href="index.html">SkillSwap</a>
  <div class="nav-links" id="navLinks"></div>
</nav>
<div class="auth-wrap">
  <div class="auth-card">
    <h2>Create Your Account</h2>
    <p class="subtitle">Join thousands of students on SkillSwap</p>
    <div class="alert" id="formAlert"></div>
    <form id="registerForm" novalidate>
      <div class="form-group">
        <label>First Name</label>
        <input type="text" id="firstName" placeholder="Jane"/>
        <span class="field-error" id="errFirst"></span>
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" id="lastName" placeholder="Doe"/>
        <span class="field-error" id="errLast"></span>
      </div>
      <div class="form-group">
        <label>University Email</label>
        <input type="email" id="email" placeholder="you@mylaurier.ca"/>
        <span class="field-error" id="errEmail"></span>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min. 8 characters"/>
        <span class="field-error" id="errPassword"></span>
      </div>
      <div class="form-group">
        <label>I am a...</label>
        <select id="role">
          <option value="">Select role</option>
          <option value="customer">Customer (Buyer)</option>
          <option value="provider">Provider (Seller)</option>
        </select>
        <span class="field-error" id="errRole"></span>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create Account</button>
    </form>
    <p class="auth-alt">Already have an account? <a href="login.html">Login</a></p>
  </div>
</div>
<script src="js/api.js"></script>
<script src="js/validation.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
