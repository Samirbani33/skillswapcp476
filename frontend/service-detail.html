<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Service Detail — SkillSwap</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<nav class="navbar">
  <a class="nav-logo" href="index.html">SkillSwap</a>
  <div class="nav-links" id="navLinks"></div>
</nav>

<div class="detail-wrap">
  <a href="marketplace.html" style="color:var(--primary);font-size:.9rem;">← Back to Marketplace</a>

  <div id="detailContent" style="margin-top:1.2rem">
    <p class="loading">Loading service...</p>
  </div>
</div>

<!-- Booking Modal -->
<div id="bookingModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);
     align-items:center;justify-content:center;z-index:999">
  <div class="auth-card" style="max-width:440px;margin:0">
    <h2>Book This Service</h2>
    <p class="subtitle" id="bookingServiceTitle"></p>
    <div class="alert" id="bookingAlert"></div>
    <form id="bookingForm" novalidate>
      <input type="hidden" id="bookingServiceId"/>
      <div class="form-group">
        <label>Message to Provider</label>
        <textarea id="bookingMessage" rows="4"
          placeholder="Describe what you need, your timeline, any questions..."></textarea>
        <span class="field-error" id="errBookingMsg"></span>
      </div>
      <div style="display:flex;gap:.8rem">
        <button type="submit" class="btn btn-primary" style="flex:1">Send Request</button>
        <button type="button" class="btn btn-secondary"
          onclick="document.getElementById('bookingModal').style.display='none'">Cancel</button>
      </div>
    </form>
  </div>
</div>

<footer><p>&copy; 2026 SkillSwap</p></footer>
<script src="js/api.js"></script>
<script src="js/validation.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  updateNav();
  const params    = new URLSearchParams(window.location.search);
  const serviceId = params.get('id');
  if (!serviceId) { window.location.href = 'marketplace.html'; return; }

  const { ok, data } = await apiFetch(`/services/${serviceId}`);
  const container    = document.getElementById('detailContent');

  if (!ok) {
    container.innerHTML = '<p class="text-muted">Service not found.</p>'; return;
  }

  const stars     = (r) => '★'.repeat(Math.round(r)) + '☆'.repeat(5 - Math.round(r));
  const reviewsHtml = data.reviews?.length
    ? data.reviews.map(r => `
        <div class="review-card">
          <div class="stars">${stars(r.rating)} ${r.rating}/5</div>
          <p>${r.comment}</p>
          <div class="meta">— ${r.reviewer_name} · ${new Date(r.created_at).toLocaleDateString()}</div>
        </div>`).join('')
    : '<p class="text-muted">No reviews yet.</p>';

  container.innerHTML = `
    <div class="detail-header">
      <div class="card-cat">${data.category}</div>
      <h1>${data.title}</h1>
      <div class="detail-meta">
        <span>👤 ${data.provider_name}</span>
        <span style="color:#F59E0B">${stars(data.avg_rating)} (${data.review_count} reviews)</span>
      </div>
      <div class="detail-price">$${parseFloat(data.price).toFixed(2)}</div>
      ${data.provider_bio ? `<p class="text-muted mt-2" style="font-size:.9rem">Provider: ${data.provider_bio}</p>` : ''}
    </div>

    <div style="background:var(--surface);border-radius:12px;padding:1.5rem;box-shadow:var(--shadow);margin-bottom:1.5rem">
      <h2 style="margin-bottom:.8rem;font-size:1.1rem">About This Service</h2>
      <p style="color:var(--muted);line-height:1.8">${data.description}</p>
      <div style="margin-top:1.5rem">
        <button class="btn btn-primary" id="bookBtn" style="font-size:1rem;padding:.8rem 2rem">
          Book This Service
        </button>
        <button class="btn btn-secondary" id="msgBtn" style="margin-left:.8rem">
          Message Provider
        </button>
      </div>
    </div>

    <div>
      <h2 style="margin-bottom:1rem;font-size:1.1rem">Reviews (${data.review_count})</h2>
      ${reviewsHtml}
    </div>`;

  // Book button
  document.getElementById('bookBtn')?.addEventListener('click', () => {
    const user = getUser();
    if (!user) { window.location.href = 'login.html'; return; }
    if (user.role !== 'customer') { alert('Only customers can book services.'); return; }
    document.getElementById('bookingServiceId').value    = data.service_id;
    document.getElementById('bookingServiceTitle').textContent = data.title;
    document.getElementById('bookingModal').style.display = 'flex';
  });

  // Message button
  document.getElementById('msgBtn')?.addEventListener('click', async () => {
    const user = getUser();
    if (!user) { window.location.href = 'login.html'; return; }
    const { ok } = await apiFetch('/messages', {
      method: 'POST',
      body: JSON.stringify({ receiver_id: data.provider_id, content: `Hi, I'm interested in your service: "${data.title}"` })
    });
    if (ok) window.location.href = 'messages.html';
    else alert('Could not start conversation.');
  });
});

// Booking form submission
document.getElementById('bookingForm')?.addEventListener('submit', async (e) => {
  e.preventDefault();
  const serviceId = document.getElementById('bookingServiceId').value;
  const message   = document.getElementById('bookingMessage').value.trim();
  clearFieldErrors('errBookingMsg');

  if (!message) { showFieldError('errBookingMsg', 'Please describe what you need.'); return; }

  const btn = e.target.querySelector('button[type=submit]');
  btn.textContent = 'Sending...'; btn.disabled = true;

  const { ok, data } = await apiFetch('/bookings', {
    method: 'POST',
    body: JSON.stringify({ service_id: parseInt(serviceId), message })
  });

  if (ok) {
    showAlert('bookingAlert', 'Booking request sent! The provider will respond soon.', 'success');
    setTimeout(() => {
      document.getElementById('bookingModal').style.display = 'none';
      window.location.href = 'customer-dashboard.html';
    }, 1500);
  } else {
    showAlert('bookingAlert', data.message || 'Booking failed. Please try again.');
    btn.textContent = 'Send Request'; btn.disabled = false;
  }
});
</script>
</body>
</html>
