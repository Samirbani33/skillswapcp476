<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Messages — SkillSwap</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .msg-layout { display:flex; gap:1.5rem; height:calc(100vh - 160px); }
    .conv-list { width:280px; flex-shrink:0; background:var(--surface);
      border-radius:12px; box-shadow:var(--shadow); overflow-y:auto; }
    .conv-item { padding:1rem 1.2rem; border-bottom:1px solid var(--border);
      cursor:pointer; transition:background .15s; }
    .conv-item:hover, .conv-item.active { background:var(--bg); }
    .conv-name { font-weight:700; font-size:.95rem; }
    .conv-preview { font-size:.8rem; color:var(--muted); margin-top:.2rem;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .conv-badge { background:var(--primary); color:#fff; border-radius:999px;
      padding:.1rem .5rem; font-size:.7rem; font-weight:700; }
    .chat-pane { flex:1; display:flex; flex-direction:column; background:var(--surface);
      border-radius:12px; box-shadow:var(--shadow); overflow:hidden; }
    .chat-header { padding:1rem 1.5rem; border-bottom:1px solid var(--border); font-weight:700; }
    .chat-messages { flex:1; overflow-y:auto; padding:1.2rem; display:flex; flex-direction:column; gap:.8rem; }
    .msg-bubble { max-width:70%; padding:.7rem 1rem; border-radius:12px; font-size:.9rem; line-height:1.5; }
    .msg-mine   { background:var(--primary); color:#fff; align-self:flex-end; border-bottom-right-radius:3px; }
    .msg-theirs { background:var(--bg); color:var(--text); align-self:flex-start; border-bottom-left-radius:3px; }
    .msg-time   { font-size:.7rem; opacity:.6; margin-top:.3rem; }
    .chat-input { padding:1rem 1.2rem; border-top:1px solid var(--border); display:flex; gap:.8rem; }
    .chat-input input { flex:1; padding:.7rem 1rem; border:1.5px solid var(--border);
      border-radius:var(--radius); font-size:.95rem; }
    .chat-input input:focus { outline:none; border-color:var(--primary); }
    .no-conv { flex:1; display:flex; align-items:center; justify-content:center; color:var(--muted); }
  </style>
</head>
<body>
<nav class="navbar">
  <a class="nav-logo" href="index.html">SkillSwap</a>
  <div class="nav-links" id="navLinks"></div>
</nav>

<div style="max-width:1100px;margin:1.5rem auto;padding:0 2rem">
  <h1 style="margin-bottom:1.2rem;font-size:1.5rem">Messages</h1>
  <div class="msg-layout">
    <div class="conv-list" id="convList"><p class="loading">Loading...</p></div>
    <div class="chat-pane" id="chatPane">
      <div class="no-conv">Select a conversation to start messaging</div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
let activeConvId = null;
let currentUser  = null;

document.addEventListener('DOMContentLoaded', async () => {
  updateNav();
  currentUser = getUser();
  if (!currentUser) { window.location.href = 'login.html'; return; }
  await loadConversations();
});

async function loadConversations() {
  const { ok, data } = await apiFetch('/messages');
  const list = document.getElementById('convList');
  if (!ok || !data.length) {
    list.innerHTML = '<p style="padding:1rem;color:var(--muted);font-size:.9rem">No conversations yet.</p>'; return;
  }
  list.innerHTML = data.map(c => `
    <div class="conv-item ${c.conversation_id == activeConvId ? 'active' : ''}"
         onclick="openConversation(${c.conversation_id}, '${c.other_user_name}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="conv-name">${c.other_user_name}</div>
        ${c.unread_count > 0 ? `<span class="conv-badge">${c.unread_count}</span>` : ''}
      </div>
      <div class="conv-preview">${c.last_message || 'No messages yet'}</div>
    </div>`).join('');
}

async function openConversation(convId, name) {
  activeConvId = convId;
  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');

  const pane = document.getElementById('chatPane');
  pane.innerHTML = `
    <div class="chat-header">${name}</div>
    <div class="chat-messages" id="chatMessages"><p class="loading">Loading...</p></div>
    <div class="chat-input">
      <input type="text" id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()"/>
      <button class="btn btn-primary" onclick="sendMessage()">Send</button>
    </div>`;

  const { ok, data } = await apiFetch(`/messages/${convId}`);
  const msgArea = document.getElementById('chatMessages');
  if (!ok || !data.length) { msgArea.innerHTML = '<p style="color:var(--muted);text-align:center">No messages yet. Say hello!</p>'; return; }

  msgArea.innerHTML = data.map(m => `
    <div>
      <div class="msg-bubble ${m.sender_id == currentUser.user_id ? 'msg-mine' : 'msg-theirs'}">
        ${m.content}
        <div class="msg-time">${new Date(m.sent_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>
      </div>
    </div>`).join('');
  msgArea.scrollTop = msgArea.scrollHeight;
  await loadConversations();
}

async function sendMessage() {
  const input   = document.getElementById('msgInput');
  const content = input?.value.trim();
  if (!content || !activeConvId) return;

  // Get receiver from conversation list
  const convData = await apiFetch(`/messages/${activeConvId}`);
  input.value = '';

  // We need receiver_id — re-fetch conversations to get other_user_id
  const { data: convs } = await apiFetch('/messages');
  const conv = convs.find(c => c.conversation_id == activeConvId);
  if (!conv) return;

  const { ok } = await apiFetch('/messages', {
    method: 'POST',
    body: JSON.stringify({ receiver_id: conv.other_user_id, content })
  });
  if (ok) await openConversation(activeConvId, conv.other_user_name);
}
</script>
</body>
</html>
