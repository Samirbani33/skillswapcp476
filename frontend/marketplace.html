<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Marketplace — SkillSwap</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<nav class="navbar">
  <a class="nav-logo" href="index.html">SkillSwap</a>
  <div class="nav-links" id="navLinks"></div>
</nav>
<div class="market-wrap">
  <div class="search-row">
    <input type="text" id="searchInput" placeholder="Search services (e.g. Python tutor, logo design...)"/>
    <button id="searchBtn" class="btn btn-primary">Search</button>
  </div>
  <div class="market-layout">
    <aside class="sidebar">
      <h3>Filters</h3>
      <div class="filter-group">
        <label>Category</label>
        <select id="categoryFilter">
          <option value="">All Categories</option>
          <option value="Programming">Programming</option>
          <option value="Tutoring">Tutoring</option>
          <option value="Design">Design</option>
          <option value="Photography">Photography</option>
          <option value="Writing">Writing</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Max Price ($)</label>
        <input type="number" id="priceFilter" placeholder="e.g. 50" min="0"/>
      </div>
      <div class="filter-group">
        <label>Sort By</label>
        <select id="sortFilter">
          <option value="rating">Best Rated</option>
          <option value="newest">Newest</option>
          <option value="price_asc">Cheapest First</option>
        </select>
      </div>
      <button id="applyFilters" class="btn btn-secondary btn-full mt-2">Apply Filters</button>
    </aside>
    <main class="services-grid" id="servicesGrid">
      <p class="loading">Loading services...</p>
    </main>
  </div>
</div>
<footer><p>&copy; 2026 SkillSwap</p></footer>
<script src="js/api.js"></script>
<script src="js/validation.js"></script>
<script src="js/marketplace.js"></script>
</body>
</html>
